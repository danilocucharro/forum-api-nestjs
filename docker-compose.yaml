version: '5.1'

services:
  postgres:
    container_name: forum-api-nest-pg
    image: postgres
    ports:
      - 5432:5432
    environment:
       POSTGRES_USER: postgres
       POSTGRES_PASSWORD: docker
       POSTGRES_DB: nest-clean
       PGDATA: /data/postgres
    volumes:
       - ./data/pg:/data/postgres
